<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Menina Boutique - Catálogo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #fef5f8 100%);
            color: #333;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #f5e6f0 0%, #ffe6f0 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid #8b3a62;
            box-shadow: 0 8px 32px rgba(139, 58, 98, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header h1 {
            font-size: 2.5rem;
            color: #8b3a62;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        header .subtitle {
            font-size: 1rem;
            color: #d4698e;
            font-weight: 300;
            letter-spacing: 1px;
        }

        header .admin-name {
            font-size: 0.85rem;
            color: #8b3a62;
            font-weight: 600;
            margin-top: 8px;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .btn-sair-admin {
            background: linear-gradient(135deg, #c94a5c, #d95f6f);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(201, 74, 92, 0.3);
            font-size: 0.9rem;
            display: none;
        }

        .btn-sair-admin.visible {
            display: block;
        }

        .btn-sair-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(201, 74, 92, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .search-section {
            background: linear-gradient(135deg, rgba(245, 230, 240, 0.8), rgba(255, 230, 240, 0.8));
            padding: 30px 20px;
            border-bottom: 2px solid rgba(212, 105, 142, 0.2);
            backdrop-filter: blur(10px);
            margin-top: 20px;
            animation: slideDown 0.6s ease 0.2s both;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(212, 105, 142, 0.3);
            border-radius: 30px;
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 58, 98, 0.1);
        }

        .search-input:focus {
            outline: none;
            border-color: #8b3a62;
            box-shadow: 0 8px 25px rgba(139, 58, 98, 0.2);
        }

        .search-input::placeholder {
            color: #d4698e;
        }

        .filters {
            background: linear-gradient(135deg, rgba(245, 230, 240, 0.8), rgba(255, 230, 240, 0.8));
            padding: 30px 20px;
            border-bottom: 2px solid rgba(212, 105, 142, 0.2);
            backdrop-filter: blur(10px);
            animation: slideDown 0.6s ease 0.2s both;
        }

        .filters.hidden {
            display: none;
        }

        .filters .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            max-width: 1200px;
            margin: 0 auto;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            font-weight: 700;
            color: #8b3a62;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            padding: 10px 14px;
            border: 2px solid rgba(212, 105, 142, 0.3);
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-group select:hover {
            border-color: #d4698e;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #8b3a62;
            box-shadow: 0 0 12px rgba(139, 58, 98, 0.2);
        }

        .btn-reset {
            padding: 10px 20px;
            background: linear-gradient(135deg, #8b3a62, #a83d7a);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(139, 58, 98, 0.2);
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 58, 98, 0.3);
        }

        main {
            padding: 60px 20px;
            min-height: calc(100vh - 300px);
        }

        main.admin-mode {
            padding: 40px 20px;
            min-height: auto;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(254, 245, 248, 0.95));
            border: 2px solid rgba(212, 105, 142, 0.2);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            box-shadow: 0 10px 30px rgba(139, 58, 98, 0.1);
            animation: slideUp 0.6s ease;
            backdrop-filter: blur(10px);
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 50px rgba(139, 58, 98, 0.25);
            border-color: #d4698e;
        }

        .product-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #f5e6f0 0%, #ffe6f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: #d4698e;
            overflow: hidden;
            position: relative;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.4s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .product-info {
            padding: 25px;
        }

        .product-info h3 {
            font-size: 1.3rem;
            color: #8b3a62;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .product-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            color: #555;
            padding: 8px 0;
            border-bottom: 1px solid rgba(212, 105, 142, 0.1);
        }

        .detail-item strong {
            color: #8b3a62;
            font-weight: 700;
        }

        .product-price {
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            text-align: center;
            padding: 16px;
            background: linear-gradient(135deg, #8b3a62, #a83d7a);
            border-radius: 12px;
            margin-bottom: 16px;
            letter-spacing: 1px;
            box-shadow: 0 6px 15px rgba(139, 58, 98, 0.3);
        }

        .product-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-delete {
            background-color: #c94a5c;
            color: white;
            padding: 8px 16px;
            font-size: 0.85rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            display: none;
        }

        .btn-delete.admin-visible {
            display: block;
        }

        .btn-delete:hover {
            background-color: #a03a4a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(201, 74, 92, 0.3);
        }

        .no-products {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 40px;
            font-size: 1.1rem;
            color: #999;
            animation: fadeIn 0.6s ease;
        }

        .no-products-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        .form-container {
            background: linear-gradient(135deg, rgba(254, 245, 248, 0.8), rgba(240, 214, 232, 0.5));
            padding: 50px;
            border-radius: 20px;
            margin: 40px auto;
            max-width: 800px;
            box-shadow: 0 15px 40px rgba(139, 58, 98, 0.1);
            border: 2px solid rgba(212, 105, 142, 0.2);
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease;
            display: none;
        }

        .form-container.visible {
            display: block;
        }

        .form-title {
            color: #8b3a62;
            font-size: 2rem;
            margin-bottom: 35px;
            text-align: center;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 700;
            color: #8b3a62;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 14px 16px;
            border: 2px solid rgba(212, 105, 142, 0.3);
            border-radius: 10px;
            font-size: 0.95rem;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #8b3a62;
            box-shadow: 0 0 15px rgba(139, 58, 98, 0.2);
            transform: translateY(-2px);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .image-upload-section {
            grid-column: 1 / -1;
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }

        .upload-box {
            flex: 1;
        }

        .image-preview {
            width: 160px;
            height: 160px;
            border: 3px solid rgba(212, 105, 142, 0.3);
            border-radius: 12px;
            overflow: hidden;
            display: none;
            background: linear-gradient(135deg, #f5e6f0 0%, #ffe6f0 100%);
            align-items: center;
            justify-content: center;
            animation: slideUp 0.3s ease;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            grid-column: 1 / -1;
            margin-top: 30px;
        }

        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b3a62, #a83d7a);
            color: white;
            box-shadow: 0 8px 20px rgba(139, 58, 98, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(139, 58, 98, 0.4);
        }

        .btn-secondary {
            background: rgba(212, 105, 142, 0.2);
            color: #8b3a62;
            border: 2px solid rgba(212, 105, 142, 0.4);
        }

        .btn-secondary:hover {
            background: rgba(212, 105, 142, 0.3);
            transform: translateY(-3px);
        }

        .success-message {
            color: #06a346;
            font-weight: 700;
            padding: 16px;
            text-align: center;
            background: linear-gradient(135deg, rgba(6, 163, 70, 0.1), rgba(6, 163, 70, 0.05));
            border-radius: 10px;
            margin-bottom: 25px;
            display: none;
            border-left: 4px solid #06a346;
            animation: slideIn 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 60px 40px;
            color: #8b3a62;
            animation: fadeIn 0.6s ease;
        }

        .spinner {
            border: 5px solid rgba(212, 105, 142, 0.2);
            border-top: 5px solid #8b3a62;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        footer {
            background: linear-gradient(135deg, #8b3a62 0%, #6b2a4a 100%);
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin-top: 80px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-top: 3px solid rgba(212, 105, 142, 0.3);
        }

        @media (max-width: 768px) {
            header h1 { font-size: 1.8rem; }
            .header-content { flex-direction: column; gap: 15px; }
            .filters .container { flex-direction: column; align-items: stretch; }
            .filter-group { min-width: unset; }
            .filter-group select { width: 100%; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
            .form-container { padding: 30px; }
            .form-title { font-size: 1.5rem; }
            .image-upload-section { flex-direction: column; align-items: center; }
            main { padding: 40px 20px; }
        }

        @media (max-width: 480px) {
            header h1 { font-size: 1.4rem; }
            header .subtitle { font-size: 0.85rem; }
            .products-grid { grid-template-columns: 1fr; gap: 15px; }
            .btn { padding: 10px 20px; font-size: 0.85rem; }
            .product-info { padding: 15px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content container">
            <div>
                <h1>✨ Menina Boutique</h1>
                <p class="subtitle">Sua Loja Online</p>
                <p class="admin-name" id="admin-name" style="display: none;">👤 Marcia - Modo Admin Ativado</p>
            </div>
            <button class="btn-sair-admin" id="btn-sair-admin" onclick="sairModoAdmin()">🚪 Sair do Admin</button>
        </div>
    </header>

    <div class="search-section" id="search-section">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="🔍 Buscar roupa, cor, tamanho..." onkeyup="buscarProdutosInteligente()">
        </div>
    </div>

    <nav class="filters" id="filters">
        <div class="container">
            <div class="filter-group">
                <label for="category-filter">Categoria:</label>
                <select id="category-filter" onchange="aplicarFiltros()">
                    <option value="">Todas</option>
                    <option value="camiseta">Camiseta</option>
                    <option value="calça">Calça</option>
                    <option value="sapato">Sapato</option>
                    <option value="vestido">Vestido</option>
                    <option value="jaqueta">Jaqueta</option>
                    <option value="acessório">Acessório</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="color-filter">Cor:</label>
                <select id="color-filter" onchange="aplicarFiltros()">
                    <option value="">Todas</option>
                    <option value="preto">Preto</option>
                    <option value="branco">Branco</option>
                    <option value="azul">Azul</option>
                    <option value="rosa">Rosa</option>
                    <option value="vinho">Vinho</option>
                    <option value="cinza">Cinza</option>
                    <option value="vermelho">Vermelho</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="size-filter">Tamanho:</label>
                <select id="size-filter" onchange="aplicarFiltros()">
                    <option value="">Todos</option>
                    <option value="PP">PP</option>
                    <option value="P">P</option>
                    <option value="M">M</option>
                    <option value="G">G</option>
                    <option value="GG">GG</option>
                </select>
            </div>
            <button class="btn-reset" onclick="limparFiltros()">🔄 Limpar</button>
        </div>
    </nav>

    <main class="container" id="main-content">
        <div id="products-container" class="products-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Carregando produtos...</p>
            </div>
        </div>
    </main>

    <div class="form-container" id="form-container">
        <h2 class="form-title">➕ Adicionar Novo Produto</h2>
        <div class="success-message" id="success-message">✅ Produto adicionado com sucesso!</div>

        <form id="form-produto">
            <div class="form-grid">
                <div class="form-group">
                    <label for="nome">Nome do Produto *</label>
                    <input type="text" id="nome" placeholder="Ex: Camiseta Rosa Pastel" required>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria *</label>
                    <select id="categoria" required>
                        <option value="">Selecione</option>
                        <option value="camiseta">Camiseta</option>
                        <option value="calça">Calça</option>
                        <option value="sapato">Sapato</option>
                        <option value="vestido">Vestido</option>
                        <option value="jaqueta">Jaqueta</option>
                        <option value="acessório">Acessório</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cor">Cor *</label>
                    <select id="cor" required>
                        <option value="">Selecione</option>
                        <option value="preto">Preto</option>
                        <option value="branco">Branco</option>
                        <option value="azul">Azul</option>
                        <option value="rosa">Rosa</option>
                        <option value="vinho">Vinho</option>
                        <option value="cinza">Cinza</option>
                        <option value="vermelho">Vermelho</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tamanho">Tamanho *</label>
                    <input type="text" id="tamanho" placeholder="Ex: M, G, 38" required>
                </div>

                <div class="form-group">
                    <label for="variacoes">Variações Disponíveis</label>
                    <input type="text" id="variacoes" placeholder="Ex: P, M, G, GG">
                </div>

                <div class="form-group">
                    <label for="preco">Preço (R$) *</label>
                    <input type="number" id="preco" placeholder="Ex: 99.90" min="0" step="0.01" required>
                </div>

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" placeholder="Descreva seu produto..."></textarea>
                </div>

                <div class="image-upload-section">
                    <div class="upload-box">
                        <label style="font-weight: 700; color: #8b3a62; font-size: 0.95rem;">
                            📸 Cole a URL da imagem (Imgur ou outra)
                        </label>
                        <input type="text" id="imagem" placeholder="https://i.imgur.com/...jpg" style="padding: 14px 16px; border: 2px solid rgba(212, 105, 142, 0.3); border-radius: 10px; width: 100%; font-size: 0.95rem; margin-top: 8px;">
                    </div>
                    <div id="image-preview" class="image-preview">
                        <img id="preview-img" src="" alt="Prévia">
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">✨ Adicionar Produto</button>
                    <button type="reset" class="btn btn-secondary">🔄 Limpar Formulário</button>
                </div>
            </div>
        </form>
    </div>

    <footer>
        <p>&copy; 2024 Menina Boutique | Todos os direitos reservados</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDkq9W9CGLa-1UjFeIDphR2loSs9c_mA2Y",
            authDomain: "catalogo-roupas-8c13e.firebaseapp.com",
            projectId: "catalogo-roupas-8c13e",
            storageBucket: "catalogo-roupas-8c13e.firebasestorage.app",
            messagingSenderId: "154437834985",
            appId: "1:154437834985:web:bcc927c454f87a4c1ab878"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let adminMode = false;
        let allProdutos = [];
        const ADMIN_USER = "Marcia";
        const ADMIN_PASSWORD = "59827630";

        // Verificar hash na URL ao carregar
        window.addEventListener('hashchange', verificarAdmin);
        window.addEventListener('load', verificarAdmin);

        function verificarAdmin() {
            if (window.location.hash === '#admin') {
                solicitarSenhaAdmin();
            } else {
                if (adminMode) {
                    sairModoAdmin();
                }
            }
        }

        function solicitarSenhaAdmin() {
            const senha = prompt("🔐 Digite a senha do admin:");
            if (senha === ADMIN_PASSWORD) {
                ativarModoAdmin();
            } else if (senha !== null) {
                alert('❌ Senha incorreta!');
                window.location.hash = '';
            }
        }

        function ativarModoAdmin() {
            adminMode = true;
            document.getElementById('form-container').classList.add('visible');
            document.getElementById('admin-name').style.display = 'block';
            document.getElementById('btn-sair-admin').classList.add('visible');
            document.getElementById('search-section').classList.add('hidden');
            document.getElementById('filters').classList.add('hidden');
            document.getElementById('main-content').classList.add('admin-mode');
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.classList.add('admin-visible');
            });
            alert(`✅ Bem-vinda ${ADMIN_USER}! Modo Admin Ativado`);
        }

        function sairModoAdmin() {
            adminMode = false;
            document.getElementById('form-container').classList.remove('visible');
            document.getElementById('admin-name').style.display = 'none';
            document.getElementById('btn-sair-admin').classList.remove('visible');
            document.getElementById('search-section').classList.remove('hidden');
            document.getElementById('filters').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('admin-mode');
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.classList.remove('admin-visible');
            });
            window.location.hash = '';
            renderizarProdutos();
        }

        // Busca inteligente com suporte a palavras parciais
        function buscarProdutosInteligente() {
            const termo = document.getElementById('search-input').value.toLowerCase().trim();
            
            if (termo === '') {
                renderizarProdutos(allProdutos);
                return;
            }

            const filtrados = allProdutos.filter(produto => {
                const nome = produto.nome.toLowerCase();
                const categoria = produto.categoria.toLowerCase();
                const cor = produto.cor.toLowerCase();
                const tamanho = produto.tamanho.toLowerCase();
                const descricao = produto.descricao ? produto.descricao.toLowerCase() : '';

                // Verificar correspondência parcial em qualquer campo
                return nome.includes(termo) || 
                       categoria.includes(termo) || 
                       cor.includes(termo) || 
                       tamanho.includes(termo) ||
                       descricao.includes(termo);
            });

            renderizarProdutos(filtrados);
        }

        async function renderizarProdutos(produtos = null) {
            const container = document.getElementById('products-container');
            try {
                if (produtos === null) {
                    const snapshot = await db.collection('produtos').get();
                    allProdutos = [];
                    snapshot.forEach(doc => {
                        allProdutos.push({ id: doc.id, ...doc.data() });
                    });
                } else {
                    allProdutos = produtos;
                }

                if (allProdutos.length === 0) {
                    container.innerHTML = `
                        <div class="no-products">
                            <span class="no-products-icon">📦</span>
                            <p>Nenhum produto encontrado. Volte mais tarde!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';
                allProdutos.forEach(produto => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div class="product-image">
                            ${produto.imagem ? `<img src="${produto.imagem}" alt="${produto.nome}" onerror="this.style.display='none'">` : '👗'}
                        </div>
                        <div class="product-info">
                            <h3>${produto.nome}</h3>
                            <div class="product-details">
                                <div class="detail-item">
                                    <strong>Categoria:</strong>
                                    <span>${produto.categoria}</span>
                                </div>
                                <div class="detail-item">
                                    <strong>Cor:</strong>
                                    <span>${produto.cor}</span>
                                </div>
                                <div class="detail-item">
                                    <strong>Tamanho:</strong>
                                    <span>${produto.tamanho}</span>
                                </div>
                            </div>
                            ${produto.descricao ? `<p style="color: #666; font-size: 0.9rem; margin-bottom: 12px;">${produto.descricao}</p>` : ''}
                            <div class="product-price">R$ ${parseFloat(produto.preco).toFixed(2)}</div>
                            <div class="product-actions">
                                <button class="btn-delete" onclick="deletarProduto('${produto.id}')">🗑️ Deletar</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = `<div class="no-products">Erro ao carregar produtos</div>`;
            }
        }

        document.getElementById('form-produto').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('nome').value;
            const categoria = document.getElementById('categoria').value;
            const cor = document.getElementById('cor').value;
            const tamanho = document.getElementById('tamanho').value;
            const preco = document.getElementById('preco').value;
            const descricao = document.getElementById('descricao').value;
            const imagem = document.getElementById('imagem').value;

            try {
                await db.collection('produtos').add({
                    nome,
                    categoria,
                    cor,
                    tamanho,
                    preco: parseFloat(preco),
                    descricao,
                    imagem,
                    criadoEm: new Date()
                });

                document.getElementById('success-message').classList.add('show');
                setTimeout(() => {
                    document.getElementById('success-message').classList.remove('show');
                }, 3000);

                document.getElementById('form-produto').reset();
                renderizarProdutos();
            } catch (error) {
                alert('Erro ao adicionar produto: ' + error.message);
            }
        });

        async function deletarProduto(id) {
            if (confirm('Tem certeza que deseja deletar?')) {
                try {
                    await db.collection('produtos').doc(id).delete();
                    renderizarProdutos();
                } catch (error) {
                    alert('Erro ao deletar: ' + error.message);
                }
            }
        }

        function aplicarFiltros() {
            const categoria = document.getElementById('category-filter').value.toLowerCase();
            const cor = document.getElementById('color-filter').value.toLowerCase();
            const tamanho = document.getElementById('size-filter').value.toLowerCase();

            const filtrados = allProdutos.filter(p => {
                return (categoria === '' || p.categoria.toLowerCase() === categoria) &&
                       (cor === '' || p.cor.toLowerCase() === cor) &&
                       (tamanho === '' || p.tamanho.toLowerCase() === tamanho);
            });

            renderizarProdutos(filtrados);
        }

        function limparFiltros() {
            document.getElementById('category-filter').value = '';
            document.getElementById('color-filter').value = '';
            document.getElementById('size-filter').value = '';
            document.getElementById('search-input').value = '';
            renderizarProdutos();
        }

        document.getElementById('imagem').addEventListener('input', function() {
            const preview = document.getElementById('image-preview');
            const previewImg = document.getElementById('preview-img');
            if (this.value) {
                previewImg.src = this.value;
                preview.style.display = 'flex';
            } else {
                preview.style.display = 'none';
            }
        });

        // Carregar produtos ao iniciar
        renderizarProdutos();
    </script>
</body>
</html>
